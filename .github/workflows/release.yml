name: Release

# When a version tag is pushed (e.g. v1.2.0), build optimised binaries and
# attach them to a GitHub Release. The WebAssembly build is published to Pages
# by the separate "WebAssembly" workflow, which also triggers on tags.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build a release for (e.g. v1.2.0)"
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  linux:
    name: Linux x86_64 release binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            meson ninja-build pkg-config gcc \
            libsdl2-dev libsdl2-image-dev \
            libgl1-mesa-dev libx11-dev \
            libavcodec-dev libavformat-dev libavutil-dev libswscale-dev \
            flex bison

      - name: Build (release)
        run: |
          meson setup build --buildtype=release -Db_sanitize=none
          meson compile -C build

      - name: Package
        id: package
        run: |
          version="${GITHUB_REF_NAME}"
          pkg="homeworld-${version}-linux-x86_64"
          mkdir -p "dist/${pkg}"
          cp build/homeworld "dist/${pkg}/"
          cp README.md LICENSE.txt "dist/${pkg}/"
          tar -C dist -czf "dist/${pkg}.tar.gz" "${pkg}"
          ( cd dist && sha256sum "${pkg}.tar.gz" > "${pkg}.tar.gz.sha256" )
          echo "archive=dist/${pkg}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "checksum=dist/${pkg}.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: homeworld-linux-release
          path: dist/*.tar.gz*
          if-no-files-found: error

      - name: Publish GitHub Release
        # Only attach to a real tag push, not manual dispatch runs.
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.checksum }}
          generate_release_notes: true
          draft: false
          prerelease: false
