name: Android

# Build the Android port (Gradle + NDK/CMake). The native dependencies SDL and
# gl4es are git submodules under android/app/jni and are checked out at the
# commits pinned in .gitmodules. Debug APKs build with no secrets; the signed
# release APK builds only when the signing secrets are configured (see below).
#
# Required repository secrets for the signed release build:
#   ANDROID_KEYSTORE_BASE64   - base64 of the release keystore (`base64 -w0 release.keystore`)
#   ANDROID_KEYSTORE_PASSWORD - keystore (store) password
#   ANDROID_KEY_ALIAS         - key alias
#   ANDROID_KEY_PASSWORD      - key password

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: android-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build APK (arm64-v8a)
    runs-on: ubuntu-latest
    env:
      # Exposed at job level so step-level `if` conditions can test for the
      # presence of the signing keystore (secrets aren't usable in `if`).
      KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          # Pin the exact NDK / CMake the project expects (app/build.gradle).
          sdkmanager --install "ndk;27.3.13750724" "cmake;3.22.1"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # Bundle the freely-redistributable demo data into the APK so it ships
      # playable. We fetch it from the project's demo-assets archive (the same
      # source the WASM build's subprojects/demo-assets.wrap uses) and verify
      # the pinned checksum, rather than committing ~67 MB of binaries to git.
      # The destination (android/app/src/main/assets/) is gitignored.
      - name: Fetch and bundle demo game data
        env:
          DEMO_URL: https://gitlab.com/gardens-of-kadesh/demo-assets/-/archive/1.05/demo-assets-1.05.tar.gz
          DEMO_SHA256: aa4df87ab95688970d91eb37b6a7ce8b69c5bf6f7ee963f75c098a4c1fb1f03d
        run: |
          set -euo pipefail
          curl -fsSL -o demo-assets.tar.gz "$DEMO_URL"
          echo "$DEMO_SHA256  demo-assets.tar.gz" | sha256sum -c -
          tar xzf demo-assets.tar.gz
          mkdir -p android/app/src/main/assets
          cp demo-assets-1.05/assets/HomeworldDL.big \
             demo-assets-1.05/assets/Update.big \
             demo-assets-1.05/assets/DL_Music.wxd \
             demo-assets-1.05/assets/DL_demo.vce \
             android/app/src/main/assets/
          ls -lh android/app/src/main/assets/

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon assembleDebug

      # The release build needs the signing keystore. It is available on pushes
      # to this repo (main/tags) but not on PRs from forks, so guard on it.
      - name: Decode signing keystore
        id: keystore
        if: ${{ env.KEYSTORE_B64 != '' }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > "${{ runner.temp }}/release.keystore"
          echo "path=${{ runner.temp }}/release.keystore" >> "$GITHUB_OUTPUT"

      - name: Build signed release APK
        if: ${{ steps.keystore.outputs.path != '' }}
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: ${{ steps.keystore.outputs.path }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew --no-daemon assembleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: gok-android-debug
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload release APK
        if: ${{ steps.keystore.outputs.path != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: gok-android-release
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      # On a version tag, attach the signed release APK to the GitHub Release
      # created by the Release workflow (action-gh-release updates it in place).
      - name: Attach release APK to GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/') && steps.keystore.outputs.path != '' }}
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/*.apk
